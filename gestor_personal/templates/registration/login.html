{% extends "layouts/base.html" %}

{% block content %}
  <h2>Iniciar Sesión</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-gradient" style="border-radius: 12px; background: var(--primary-gradient); border: none;">Entrar</button>
  </form>
  <p>¿No tienes una cuenta?<a href="{% url 'register' %}" class="btn btn-link text-muted">Registrarse</a></p>    
{% endblock %}
