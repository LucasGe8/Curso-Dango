{% extends 'layouts/base.html' %}

{% block title %}
    {% if task.id %}Editar{% else %}Nueva{% endif %} Tarea | Gestor Personal
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-premium p-4" style="border-radius: 24px;">
            <div class="card-body">
                <h2 class="fw-bold mb-4">{% if task.id %}Editar{% else %}Nueva{% endif %} Tarea</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold" style="border-radius: 12px; background: var(--primary-gradient); border: none;">
                            {% if task.id %}Guardar Cambios{% else %}Crear Tarea{% endif %}
                        </button>
                        <a href="{% url 'tasks' %}" class="btn btn-link text-muted">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
