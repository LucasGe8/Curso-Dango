<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <h1>
        Formulario Django
    </h1>
    <hr>
    <div style="display: flex; justify-content: center; align-items: center; width: 700px; margin: 0 auto; text-align: center; padding: 20px; border: 1px solid #ccc; border-radius: 10px;">
    <form action="{% url 'widget' %}" method="post" style="width: 600px;">
        {% csrf_token %}
        {{form}}
        <input type="submit" value="Enviar" class = "btn btn-success mt-2" style="margin-top: 5px;">
    </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
